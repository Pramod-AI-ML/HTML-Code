<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            text-align: center;
            padding-top: 100px;
        }
        h1 {
            font-size: 60px;
            margin-bottom: 20px;
        }
        p {
            font-size: 24px;
        }
        .button {
            margin-top: 40px;
            padding: 15px 30px;
            font-size: 20px;
            color: #2575fc;
            background-color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .button:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <h1>Welcome!</h1>
    <p>We're glad to have you here. Explore and enjoy your stay.</p>
    <button class="button" onclick="alert('Hello! Enjoy your visit.')">Click Me</button>
</body>
</html>
